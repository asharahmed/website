<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .sans { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
      .mono { font-family: "SF Mono", "Geist Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- field -->
  <rect width="1200" height="630" fill="#16213c"/>
  <!-- subtle dot grain band is overkill at this size; keep it clean -->

  <!-- left accent rail -->
  <rect x="0" y="0" width="10" height="630" fill="#b23a2f"/>

  <!-- eyebrow -->
  <rect x="96" y="118" width="34" height="3" fill="#b23a2f"/>
  <text x="146" y="125" class="mono" font-size="22" letter-spacing="4" fill="#9aa6c2">SECURITY &amp; SOFTWARE ENGINEERING</text>

  <!-- name -->
  <text x="94" y="290" class="sans" font-size="104" font-weight="800" letter-spacing="-3" fill="#f6f2e8">Ashar S. Ahmed</text>

  <!-- role -->
  <text x="96" y="360" class="sans" font-size="36" font-weight="500" fill="#c9d2e6">Software Engineer &#183; Cyber Security Advisor &#183; CISSP</text>

  <!-- divider -->
  <rect x="96" y="468" width="1008" height="1" fill="#2c3a5e"/>

  <!-- credential row -->
  <text x="96" y="540" class="mono" font-size="27" letter-spacing="1" fill="#9aa6c2">CISSP &#183; SSCP &#183; AWS SA/Dev &#183; MSc Cybersecurity</text>
  <text x="1104" y="540" text-anchor="end" class="mono" font-size="27" letter-spacing="1" fill="#d2685c">aahmed.org</text>
</svg>
